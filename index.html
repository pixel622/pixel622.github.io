<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGC Custom Label Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* BLACK OUTER BORDER */
        .label-outer {
            width: 700px;
            height: 250px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            padding: 12px;
            border-radius: 4px;
            color: white;
        }

        /* HEADER SECTION (CGC LOGO & NAME) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            padding: 0 10px 8px 10px;
        }

        .cgc-brand {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
        }

        .cgc-brand span { font-weight: 300; margin-right: 5px; font-size: 22px; }

        .header-text {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* SILVER GRADIENT INNER AREA */
        .label-inner {
            flex-grow: 1;
            background: linear-gradient(135deg, #bdc3c7 0%, #ffffff 40%, #ffffff 100%);
            border-radius: 2px;
            display: flex;
            padding: 15px;
            box-sizing: border-box;
            color: #000;
            position: relative;
        }

        /* LEFT SIDE TEXT */
        .content-left {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        input[type="text"] {
            border: none;
            background: transparent;
            font-family: inherit;
            color: #111;
            padding: 2px 0;
            margin: 0;
            font-weight: 700;
            width: 100%;
        }

        input[type="text"]:focus { outline: none; background: rgba(0,0,0,0.05); }

        .card-title { font-size: 26px; line-height: 1.1; }
        .card-sub { font-size: 22px; }

        /* RIGHT SIDE GRADE */
        .content-right {
            flex: 1;
            border-left: 2px solid #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
        }

        .grade-label {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: -5px;
        }

        .grade-number {
            font-size: 85px;
            font-weight: 800;
            line-height: 1;
        }

        /* BARCODE SECTION */
        .footer-barcode {
            position: absolute;
            bottom: 15px;
            left: 15px;
            display: flex;
            align-items: flex-end;
        }

        .barcode-sim {
            width: 280px;
            height: 25px;
            background-image: linear-gradient(90deg, 
                #000 0% 1%, #fff 1% 2%, #000 2% 4%, #fff 4% 5%, 
                #000 5% 5.5%, #fff 5.5% 7%, #000 7% 10%, #fff 10% 11%,
                #000 11% 14%, #fff 14% 15%, #000 15% 18%, #fff 18% 22%,
                #000 22% 24%, #fff 24% 28%, #000 28% 35%, #fff 35% 38%,
                #000 38% 45%, #fff 45% 50%, #000 50% 55%, #fff 55% 60%);
            background-size: cover;
            margin-right: 10px;
        }

        .cert-number {
            font-size: 18px;
            font-weight: 400;
            color: #444;
        }

        /* DOWNLOAD BUTTON */
        #download-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        #download-btn:hover { background-color: #333; }
    </style>
</head>
<body>

    <div id="capture-area" class="label-outer">
        <div class="header">
            <div class="cgc-brand"><span>⚖️</span>CGC</div>
            <div class="header-text">Certified Guaranty Company</div>
        </div>
        
        <div class="label-inner">
            <div class="content-left">
                <input type="text" class="card-title" value="Pokémon Illustrator">
                <input type="text" class="card-sub" value="Pokémon (1998) Japanese">
                <input type="text" class="card-sub" value="CoroCoro Comics">
                <input type="text" class="card-sub" value="Illustration Contest">
                
                <div class="footer-barcode">
                    <div class="barcode-sim"></div>
                    <input type="text" class="cert-number" style="width: 150px;" value="1400294317663">
                </div>
            </div>

            <div class="content-right">
                <div class="grade-label">Gem Mint</div>
                <input type="text" class="grade-number" value="10" style="text-align: center;">
            </div>
        </div>
    </div>

    <button id="download-btn">DOWNLOAD CGC LABEL</button>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            const label = document.getElementById('capture-area');
            html2canvas(label, {
                scale: 4, 
                backgroundColor: null,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'cgc-custom-label.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        });
    </script>

</body>
</html>
