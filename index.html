<!DOCTYPE html>
<html>
<head>
<style>
    :root {
        --psa-red: #e41e26;
        --label-bg: #f2f2f2;
    }

    body {
        background-color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    /* The Main Label Container */
    .psa-label {
        width: 500px;
        height: 180px;
        background-color: var(--psa-red);
        padding: 12px;
        border-radius: 4px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Inner White Card */
    .inner-card {
        background-color: var(--label-bg);
        width: 100%;
        height: 100%;
        padding: 10px 20px;
        box-sizing: border-box;
        position: relative;
        display: grid;
        grid-template-columns: 2fr 1fr;
        grid-template-rows: auto auto auto;
        text-transform: uppercase;
        color: #1a1a1a;
    }

    /* Text Styling */
    .card-info {
        font-weight: 500;
        font-size: 26px;
        line-height: 1.2;
        letter-spacing: 0.5px;
    }

    .card-number {
        text-align: right;
        font-size: 26px;
        font-weight: 500;
    }

    .grade-section {
        grid-column: 2;
        text-align: right;
        margin-top: 5px;
    }

    .grade-text {
        font-size: 26px;
        font-weight: 500;
        display: block;
    }

    .grade-number {
        font-size: 38px;
        font-weight: 600;
        margin-top: -5px;
        display: block;
    }

    .cert-number {
        position: absolute;
        bottom: 15px;
        right: 20px;
        font-size: 32px;
        letter-spacing: 2px;
        font-weight: 400;
    }

    /* PSA Logo Placeholder */
    .psa-logo-holo {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 40px;
        background: linear-gradient(135deg, #a1a1a1 0%, #e1e1e1 50%, #a1a1a1 100%);
        border: 1px solid #999;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        color: #003399;
        font-style: italic;
        font-size: 18px;
        border-bottom: none;
    }
</style>
</head>
<body>

<div class="psa-label">
    <div class="inner-card">
        <div class="card-info">
            1999 POKEMON GAME<br>
            CHARIZARD - HOLO<br>
            SHADOWLESS
        </div>

        <div class="card-number">#4</div>

        <div class="grade-section">
            <span class="grade-text">VG - EX</span>
            <span class="grade-number">4</span>
        </div>

        <div class="psa-logo-holo">PSA</div>
        <div class="cert-number">28635465</div>
    </div>
</div>

</body>
</html>
