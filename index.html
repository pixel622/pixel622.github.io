<!DOCTYPE html>
<html>
<head>
    <title>Full TD Game</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: sans-serif; }
        canvas { background: #333; display: block; margin: 10px auto; border: 2px solid #555; cursor: crosshair; }
    </style>
</head>
<body>
    <h1>Tower Defense: Levels</h1>
    <p>Money: $<span id="money">100</span> | Level: <span id="level">1</span></p>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const moneyEl = document.getElementById('money');
        const levelEl = document.getElementById('level');

        let money = 100;
        let currentLevel = 0;
        let enemies = [];
        let towers = [];
        let projectiles = [];

        // Define Levels
        const levels = [
            { path: [{x: 0, y: 300}, {x: 800, y: 300}], enemyHealth: 10, speed: 2 },
            { path: [{x: 0, y: 100}, {x: 700, y: 100}, {x: 700, y: 500}, {x: 0, y: 500}], enemyHealth: 20, speed: 2.5 }
        ];

        class Enemy {
            constructor(levelData) {
                this.path = levelData.path;
                this.x = this.path[0].x;
                this.y = this.path[0].y;
                this.pathIndex = 0;
                this.speed = levelData.speed;
                this.health = levelData.enemyHealth;
                this.maxHealth = levelData.enemyHealth;
            }
            update() {
                let target = this.path[this.pathIndex + 1];
                if (target) {
                    let dx = target.x - this.x;
                    let dy = target.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < this.speed) {
                        this.pathIndex++;
                    } else {
                        this.x += (dx / dist) * this.speed;
                        this.y += (dy / dist) * this.speed;
                    }
                }
            }
            draw() {
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();
                // Health bar
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x-10, this.y-15, 20, 4);
                ctx.fillStyle = 'green';
                ctx.fillRect(this.x-10, this.y-15, 20 * (this.health/this.maxHealth), 4);
            }
        }

        class Tower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.range = 150;
                this.cooldown = 0;
            }
            draw() {
                ctx.fillStyle = 'cyan';
                ctx.fillRect(this.x-15, this.y-15, 30, 30);
                // Range circle
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
                ctx.stroke();
            }
            update() {
                if (this.cooldown > 0) this.cooldown--;
                if (this.cooldown === 0) {
                    // Find target
                    let target = enemies.find(e => Math.hypot(e.x - this.x, e.y - this.y) < this.range);
                    if (target) {
                        projectiles.push({x: this.x, y: this.y, target: target, speed: 5});
                        this.cooldown = 30; // Frames between shots
                    }
                }
            }
        }

        // Click to build
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (money >= 50) {
                towers.push(new Tower(x, y));
                money -= 50;
                moneyEl.innerText = money;
            }
        });

        // Spawn Wave
        function spawnWave() {
            for(let i=0; i<10; i++) {
                setTimeout(() => {
                    enemies.push(new Enemy(levels[currentLevel]));
                }, i * 1000);
            }
        }

        // Game Loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Path
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 30;
            ctx.beginPath();
            ctx.moveTo(levels[currentLevel].path[0].x, levels[currentLevel].path[0].y);
            levels[currentLevel].path.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();

            towers.forEach(t => { t.update(); t.draw(); });
            
            projectiles.forEach((p, i) => {
                let dx = p.target.x - p.x;
                let dy = p.target.y - p.y;
                let dist = Math.hypot(dx, dy);
                if (dist < p.speed) {
                    p.target.health -= 5;
                    projectiles.splice(i, 1);
                } else {
                    p.x += (dx / dist) * p.speed;
                    p.y += (dy / dist) * p.speed;
                    ctx.fillStyle = 'yellow';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                }
            });

            enemies.forEach((enemy, index) => {
                enemy.update();
                enemy.draw();
                if (enemy.health <= 0) {
                    enemies.splice(index, 1);
                    money += 10;
                    moneyEl.innerText = money;
                }
                if (enemy.pathIndex >= levels[currentLevel].path.length - 1) {
                    // Enemy reached end - simple loss condition
                    enemies.splice(index, 1);
                }
            });

            if (enemies.length === 0) {
                // Next level logic could go here
            }

            requestAnimationFrame(gameLoop);
        }

        spawnWave();
        gameLoop();
    </script>
</body>
</html>
