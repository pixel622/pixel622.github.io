<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Platform</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* EXACT iOS RINGER HUD */
        #ringer-hud {
            position: fixed;
            top: -60px; /* Hidden */
            left: 50%;
            transform: translateX(-50%);
            width: 160px; /* Small capsule size like iPad */
            height: 40px;
            background: rgba(45, 45, 45, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px 15px;
            z-index: 10000;
            transition: top 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #ringer-label {
            color: #999;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        #ringer-row {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 8px;
        }

        #ringer-icon {
            font-size: 14px;
            color: #fff;
        }

        #ringer-track {
            flex-grow: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
        }

        #ringer-fill {
            width: 0%; /* Start at 0 */
            height: 100%;
            background: #fff;
            border-radius: 2px;
        }

        /* Rainbow Flash Animation */
        @keyframes strobe {
            0% { background-color: #ff0000; }
            20% { background-color: #ffff00; }
            40% { background-color: #00ff00; }
            60% { background-color: #00ffff; }
            80% { background-color: #ff00ff; }
            100% { background-color: #ff0000; }
        }

        .active-flash {
            animation: strobe 0.05s infinite linear;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 18px;
            cursor: pointer;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            display: none;
        }

        #big-text {
            display: none;
            font-size: 8vw;
            color: white;
            font-weight: 900;
            text-align: center;
            z-index: 100;
            text-shadow: 0 0 20px black;
        }
    </style>
</head>
<body>

    <div id="ringer-hud">
        <div id="ringer-label">Ringer</div>
        <div id="ringer-row">
            <span id="ringer-icon">🔔</span>
            <div id="ringer-track">
                <div id="ringer-fill"></div>
            </div>
        </div>
    </div>

    <button id="start-btn">PRESS TO START TRADING</button>
    <div id="big-text">ROBIN IS GAYYYYYYYYYYYYY</div>

    <script>
        const btn = document.getElementById('start-btn');
        const hud = document.getElementById('ringer-hud');
        const fill = document.getElementById('ringer-fill');
        const txt = document.getElementById('big-text');
        const body = document.body;

        // 1s delay
        setTimeout(() => {
            btn.style.display = 'block';
        }, 1000);

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            body.classList.add('active-flash');
            txt.style.display = 'block';
            
            // Show HUD
            hud.style.top = '10px';

            // Increase volume bar
            let vol = 0;
            const interval = setInterval(() => {
                vol += 5;
                fill.style.width = vol + '%';
                if (vol >= 100) clearInterval(interval);
            }, 40);

            // Auto-hide HUD after it fills, just like a real iPad
            setTimeout(() => {
                hud.style.top = '-60px';
            }, 2500);
        });
    </script>
</body>
</html>
