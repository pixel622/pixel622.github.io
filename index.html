<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSA Label Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* BIG RED BORDER AREA (Restored thickness) */
        .label-outer {
            width: 700px;
            height: 200px;
            background-color: #D32F2F;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 15px; /* Big thick red lines like before */
        }

        /* Inner White Area */
        .label-inner {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            background-image: linear-gradient(0deg, #f0f9ff 1px, transparent 1px);
            background-size: 100% 12px;
            display: flex;
            flex-direction: column;
            padding: 8px 15px;
            box-sizing: border-box;
            position: relative;
        }

        /* Normal Writing */
        input[type="text"] {
            border: none;
            background: transparent;
            font-family: "Helvetica", "Arial", sans-serif;
            color: #111;
            text-transform: uppercase;
            padding: 0;
            margin: 0;
            font-weight: 400; 
            letter-spacing: 0.5px;
        }

        input[type="text"]:focus { outline: none; }

        .row {
            display: flex;
            width: 100%;
            height: 38px;
            align-items: center;
        }

        .main-text { flex: 1; font-size: 26px; }
        .right-aligned { text-align: right; }

        /* REALISTIC BARCODE (Smaller and irregular widths) */
        .barcode-sim {
            width: 180px; /* Made smaller */
            height: 32px;
            background: #fff;
            position: relative;
            background-image: linear-gradient(90deg, 
                #000 0% 1%, #fff 1% 2%, 
                #000 2% 4%, #fff 4% 5%, 
                #000 5% 5.5%, #fff 5.5% 7%, 
                #000 7% 10%, #fff 10% 11%,
                #000 11% 12%, #fff 12% 15%,
                #000 15% 18%, #fff 18% 19%,
                #000 19% 20%, #fff 20% 25%,
                #000 25% 26%, #fff 26% 28%,
                #000 28% 32%, #fff 32% 35%,
                #000 35% 36%, #fff 36% 40%,
                #000 40% 45%, #fff 45% 46%,
                #000 46% 48%, #fff 48% 55%,
                #000 55% 58%, #fff 58% 60%,
                #000 60% 61%, #fff 61% 65%,
                #000 65% 70%, #fff 70% 72%,
                #000 72% 75%, #fff 75% 80%,
                #000 80% 82%, #fff 82% 85%,
                #000 85% 90%, #fff 90% 92%,
                #000 92% 100%);
            margin-right: 15px;
        }

        /* PSA Logo - Overlapping the thick red line */
        .psa-logo-container {
            position: absolute;
            bottom: 0px; /* Sitting directly on bottom */
            left: 50%;
            transform: translateX(-50%);
            width: 130px; 
            height: 45px;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #999;
            z-index: 100;
        }

        .psa-logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
        }

        .p { color: #00448d; }
        .s { color: #cc0000; }
        .a { color: #00448d; }

        #download-btn {
            margin-top: 40px;
            padding: 15px 30px;
            background: #222;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="capture-area" class="label-outer">
        <div class="label-inner">
            <div class="row">
                <input type="text" class="main-text" value="1999 POKÉMON JPN. GYM 2">
                <input type="text" class="right-aligned" style="width: 100px; font-size: 24px;" value="#150">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="GIOVANNI'S MEWTWO">
                <input type="text" class="right-aligned" style="width: 150px; font-size: 24px;" value="GEM MT">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="HOLO"> 
                <input type="text" class="right-aligned" style="width: 80px; font-size: 38px;" value="10">
            </div>

            <div class="row" style="margin-top: 5px;">
                <div class="barcode-sim"></div>
                <input type="text" class="right-aligned" style="flex: 1; font-size: 22px;" value="45729103">
            </div>

            <div class="psa-logo-container">
                <div class="psa-logo">
                    <span class="p">P</span><span class="s">S</span><span class="a">A</span>
                </div>
            </div>
        </div>
    </div>

    <button id="download-btn">DOWNLOAD TO PHOTOS</button>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            const label = document.getElementById('capture-area');
            html2canvas(label, {
                scale: 4,
                backgroundColor: null,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'custom-psa-label.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        });
    </script>

</body>
</html>
