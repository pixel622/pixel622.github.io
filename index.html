<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSA Label Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Outer Red Border */
        .label-outer {
            width: 700px;
            height: 220px;
            background-color: #D32F2F;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 5px;
        }

        /* Inner White Area */
        .label-inner {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            background-image: linear-gradient(0deg, #f0f9ff 1px, transparent 1px);
            background-size: 100% 15px;
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Normal Writing (Not Bold) */
        input[type="text"] {
            border: none;
            background: transparent;
            font-family: "Helvetica", "Arial", sans-serif;
            color: #111;
            text-transform: uppercase;
            padding: 0;
            margin: 0;
            font-weight: 400; /* Normal weight, no 'B' effect */
            letter-spacing: 0.5px;
        }

        input[type="text"]:focus {
            outline: none;
        }

        .row {
            display: flex;
            width: 100%;
            height: 40px;
            align-items: center;
        }

        .main-text { flex: 1; font-size: 28px; }
        .right-aligned { text-align: right; }

        /* Visual Barcode */
        .barcode-sim {
            width: 250px;
            height: 45px;
            background: repeating-linear-gradient(
                90deg,
                #000,
                #000 1px,
                #fff 1px,
                #fff 3px,
                #000 3px,
                #000 4px,
                #fff 4px,
                #fff 5px
            );
            margin-right: 15px;
        }

        /* PSA Logo Box - Covers the red line completely */
        .psa-logo-container {
            position: absolute;
            bottom: -5px; /* Aligns to bottom of red container */
            left: 50%;
            transform: translateX(-50%);
            width: 140px; /* Wider to cover more of the line */
            height: 55px;
            background-color: #d8dee9; /* Silver-grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #999;
            z-index: 100;
        }

        .psa-logo {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
        }

        .p { color: #00448d; }
        .s { color: #cc0000; }
        .a { color: #00448d; }

        #download-btn {
            margin-top: 40px;
            padding: 15px 30px;
            background: #222;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="capture-area" class="label-outer">
        <div class="label-inner">
            <div class="row">
                <input type="text" class="main-text" value="1999 POKÉMON JPN. GYM 2">
                <input type="text" class="right-aligned" style="width: 100px; font-size: 26px;" value="#150">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="GIOVANNI'S MEWTWO">
                <input type="text" class="right-aligned" style="width: 150px; font-size: 26px;" value="GEM MT">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="HOLO"> 
                <input type="text" class="right-aligned" style="width: 80px; font-size: 40px;" value="10">
            </div>

            <div class="row" style="margin-top: 10px;">
                <div class="barcode-sim"></div>
                <input type="text" class="right-aligned" style="flex: 1; font-size: 24px;" value="45729103">
            </div>

            <div class="psa-logo-container">
                <div class="psa-logo">
                    <span class="p">P</span><span class="s">S</span><span class="a">A</span>
                </div>
            </div>
        </div>
    </div>

    <button id="download-btn">DOWNLOAD TO PHOTOS</button>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            // Target the outer container to include the red border and the logo overlap
            const label = document.getElementById('capture-area');
            
            html2canvas(label, {
                scale: 3,
                backgroundColor: null,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'psa-label.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        });
    </script>

</body>
</html>
