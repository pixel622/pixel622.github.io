<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom PSA Pokémon Label Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif; /* A generic sans-serif for wide compatibility */
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Outer Red Border Area */
        .label-outer {
            width: 700px;
            height: 200px;
            background-color: #D32F2F; /* Closest vintage PSA label red */
            padding: 2px; /* Small outer border effect */
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Inner White Lined Area */
        .label-inner {
            width: calc(100% - 30px); /* 15px margin on left and right */
            height: calc(100% - 16px); /* 8px margin on top and bottom */
            background-color: #ffffff;
            /* Subtle blue faint line watermark */
            background-image: linear-gradient(0deg, #e6f7ff 1px, transparent 1px);
            background-size: 100% 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
        }

        /* Text Input Styling (makes inputs look like flat text) */
        input[type="text"] {
            border: none;
            background: transparent;
            font-family: inherit;
            color: #333333;
            width: 100%;
            text-transform: uppercase;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        /* Focused input (when editing) - small visual cue */
        input[type="text"]:focus {
            outline: none;
            background-color: #e0f2f1;
        }

        /* Row Container */
        .row {
            display: flex;
            width: 100%;
            height: 38px; /* Fixed height per row to match line pattern */
            align-items: center;
        }

        /* Main Left Text */
        .main-text {
            flex: 1; /* Pushes the card number to the right */
            font-size: 26px;
            font-weight: 500;
        }

        /* Details (Right Aligned Column) */
        .details {
            width: 170px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-between;
            height: 100%;
        }

        .right-aligned {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 600;
            text-align: right;
        }

        /* Sizing and layout for specific right-side elements */
        .detail-line {
            display: flex;
            width: 100%;
            height: 38px; /* Aligning with left rows */
            align-items: center;
            justify-content: flex-end;
            font-size: 24px;
        }

        .grade-number-line {
            display: flex;
            width: 100%;
            height: 38px;
            align-items: center;
            justify-content: flex-end;
            font-size: 34px; /* Larger font for main grade */
        }

        /* Center PSA Logo */
        .psa-logo-container {
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 48px;
            background-color: #eaecef; /* Gray/White logo background block */
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #c0c0c0;
            border-left: 1px solid #c0c0c0;
            border-right: 1px solid #c0c0c0;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }

        .psa-logo {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -2px;
            font-family: 'Montserrat', sans-serif; /* Use a font with strong, bold characteristics */
        }

        .p { color: #0056b3; } /* PSA Blue */
        .s { color: #d32f2f; } /* PSA Red */
        .a { color: #0056b3; } /* PSA Blue */

        /* Responsive scaling (optional) */
        @media screen and (max-width: 750px) {
            .label-outer {
                width: 90vw;
                height: 25.7vw; /* maintain aspect ratio */
            }
            .label-inner {
                padding: 1vw;
                background-size: 100% 1.7vw;
            }
            input[type="text"] {
                font-size: 3vw;
            }
            .psa-logo-container {
                width: 14vw;
                height: 6vw;
            }
            .psa-logo {
                font-size: 4.5vw;
            }
        }

    </style>
</head>
<body>

    <div class="label-outer">
        <div class="label-inner">

            <div class="row">
                <input type="text" class="main-text" value="1999 POKÉMON JPN. GYM 2">
                <input type="text" class="right-aligned" style="width: 80px; font-size: 24px;" value="#150">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="GIOVANNI'S MEWTWO">
                <input type="text" class="right-aligned" style="width: 140px; font-size: 24px;" value="GEM MT">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="HOLO"> <input type="text" class="right-aligned" style="width: 100px; font-size: 38px; font-weight: 700; color: #111;" value="10">
            </div>

            <div class="row">
                <input type="text" class="main-text" style="font-size: 22px;" value="PSA/DNA CERT">
                <input type="text" class="right-aligned" style="width: 200px; font-size: 22px;" value="45729103">
            </div>

            <div class="psa-logo-container">
                <div class="psa-logo">
                    <span class="p">P</span><span class="s">S</span><span class="a">A</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
