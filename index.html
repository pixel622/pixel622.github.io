<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Platform</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        #start-btn {
            display: none; /* Hidden at start */
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #00ff00;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* The flashing rainbow animation */
        @keyframes strobe {
            0% { background-color: red; }
            20% { background-color: yellow; }
            40% { background-color: lime; }
            60% { background-color: cyan; }
            80% { background-color: fuchsia; }
            100% { background-color: red; }
        }

        .rainbow-flash {
            animation: strobe 0.05s infinite; /* Extremely fast flash */
        }

        #message {
            display: none;
            font-size: 10vw; /* Massive text */
            color: white;
            text-shadow: 5px 5px 10px black;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="start-btn">PRESS TO START TRADING</button>
    <div id="message">ROBIN IS GAYYYYYYYYYYYYY</div>

    <script>
        const btn = document.getElementById('start-btn');
        const msg = document.getElementById('message');
        const body = document.body;

        // 1. Wait 1 second then show the button
        setTimeout(() => {
            btn.style.display = 'block';
        }, 1000);

        // 2. Click event
        btn.addEventListener('click', () => {
            // Hide the button
            btn.style.display = 'none';
            
            // Start the flashing
            body.classList.add('rainbow-flash');
            
            // Show the massive message
            msg.style.display = 'block';
        });
    </script>
</body>
</html>
