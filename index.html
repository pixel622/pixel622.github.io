<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exact PSA Label Replica</title>
    <style>
        /* This font mimics the thin, slightly spaced-out look of the real labels */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier Prime', monospace;
        }

        .psa-red-frame {
            width: 720px;
            height: 190px;
            background-color: #df1a23;
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .label-white-area {
            width: 100%;
            height: 100%;
            background-color: #fdfdfd;
            position: relative;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* The actual text layout */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
        }

        input {
            border: none;
            background: transparent;
            font-family: 'Courier Prime', monospace;
            text-transform: uppercase;
            color: #1a1a1a;
            padding: 0;
            outline: none;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .left { width: 75%; }
        .right { width: 25%; text-align: right; }

        /* The Barcode at the bottom left */
        .barcode-area {
            font-family: 'Libre Barcode 39', cursive; /* Generic barcode look */
            font-size: 50px;
            margin-top: -5px;
            letter-spacing: -2px;
            color: #000;
        }

        /* The Holographic Logo Rectangle */
        .hologram-box {
            position: absolute;
            bottom: -5px; /* Overlapping the red edge like the original */
            left: 50%;
            transform: translateX(-50%);
            width: 95px;
            height: 52px;
            background: linear-gradient(135deg, #a1a1a1 0%, #cfcfcf 50%, #a1a1a1 100%);
            border: 1px solid #888;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }

        .hologram-text {
            font-style: italic;
            font-weight: 900;
            font-size: 26px;
            letter-spacing: -2px;
            font-family: sans-serif;
        }

        .p-blue { color: #073a7a; }
        .s-red { color: #cc0000; }
        .a-blue { color: #073a7a; }

        .serial-text {
            font-size: 32px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="psa-red-frame">
        <div class="label-white-area">
            
            <div class="row">
                <input type="text" class="left" value="1999 POKEMON GAME">
                <input type="text" class="right" value="#4">
            </div>

            <div class="row">
                <input type="text" class="left" value="CHARIZARD - HOLO">
                <input type="text" class="right" value="VG - EX">
            </div>

            <div class="row">
                <input type="text" class="left" value="SHADOWLESS">
                <input type="text" class="right" value="4">
            </div>

            <div class="row" style="align-items: flex-end;">
                <div class="barcode-area">|||||||||||||||||||||</div>
                <input type="text" class="right serial-text" value="28635465">
            </div>

            <div class="hologram-box">
                <div class="hologram-text">
                    <span class="p-blue">P</span><span class="s-red">S</span><span class="a-blue">A</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
