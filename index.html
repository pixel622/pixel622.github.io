<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom PSA Pokémon Label Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column; /* Changed to column to fit button below */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Outer Red Border Area */
        .label-outer {
            width: 700px;
            height: 200px;
            background-color: #D32F2F;
            padding: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Inner White Lined Area */
        .label-inner {
            width: calc(100% - 30px);
            height: calc(100% - 16px);
            background-color: #ffffff;
            background-image: linear-gradient(0deg, #e6f7ff 1px, transparent 1px);
            background-size: 100% 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
        }

        input[type="text"] {
            border: none;
            background: transparent;
            font-family: inherit;
            color: #333333;
            width: 100%;
            text-transform: uppercase;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            background-color: #e0f2f1;
        }

        .row {
            display: flex;
            width: 100%;
            height: 38px;
            align-items: center;
        }

        .main-text {
            flex: 1;
            font-size: 26px;
            font-weight: 500;
        }

        .right-aligned {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 600;
            text-align: right;
        }

        .psa-logo-container {
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 48px;
            background-color: #eaecef;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #c0c0c0;
            border-left: 1px solid #c0c0c0;
            border-right: 1px solid #c0c0c0;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }

        .psa-logo {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .p { color: #0056b3; }
        .s { color: #d32f2f; }
        .a { color: #0056b3; }

        /* Button Styling */
        #download-btn {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 16px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #download-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div id="capture-area" class="label-outer">
        <div class="label-inner">
            <div class="row">
                <input type="text" class="main-text" value="1999 POKÉMON JPN. GYM 2">
                <input type="text" class="right-aligned" style="width: 80px; font-size: 24px;" value="#150">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="GIOVANNI'S MEWTWO">
                <input type="text" class="right-aligned" style="width: 140px; font-size: 24px;" value="GEM MT">
            </div>

            <div class="row">
                <input type="text" class="main-text" value="HOLO"> 
                <input type="text" class="right-aligned" style="width: 100px; font-size: 38px; font-weight: 700; color: #111;" value="10">
            </div>

            <div class="row">
                <input type="text" class="main-text" style="font-size: 22px;" value="PSA/DNA CERT">
                <input type="text" class="right-aligned" style="width: 200px; font-size: 22px;" value="45729103">
            </div>

            <div class="psa-logo-container">
                <div class="psa-logo">
                    <span class="p">P</span><span class="s">S</span><span class="a">A</span>
                </div>
            </div>
        </div>
    </div>

    <button id="download-btn">Download to Photos</button>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            const label = document.getElementById('capture-area');
            
            // Capture the label div
            html2canvas(label, {
                scale: 3, // High quality scale
                backgroundColor: null // Transparent background around rounded corners if any
            }).then(canvas => {
                // Create a link to download the image
                const link = document.createElement('a');
                link.download = 'psa-custom-label.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        });
    </script>

</body>
</html>
