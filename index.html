<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PSA Style Label Generator</title>
    <style>
        /* Importing a font that mimics the PSA blocky condensed style */
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700&display=swap');

        body {
            background-color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Archivo Narrow', sans-serif;
        }

        /* The Red Outer Border */
        .psa-card {
            width: 750px;
            height: 220px;
            background-color: #e31e24; /* Authentic PSA Red */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* The White Inner Label */
        .psa-label {
            width: 710px;
            height: 180px;
            background-color: #ffffff;
            /* Blue horizontal security lines */
            background-image: linear-gradient(#e1f1f8 1px, transparent 1px);
            background-size: 100% 12px;
            position: relative;
            padding: 15px 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Styling for the editable text lines */
        .line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            text-transform: uppercase;
        }

        input {
            border: none;
            background: transparent;
            font-family: 'Archivo Narrow', sans-serif;
            color: #222;
            padding: 0;
            margin: 0;
            outline: none;
        }

        /* Left Side Text */
        .left-col {
            font-size: 34px;
            letter-spacing: 1px;
            width: 70%;
        }

        /* Right Side Text (Numbers/Grades) */
        .right-col {
            text-align: right;
            font-size: 34px;
            width: 30%;
            font-weight: 400;
        }

        /* PSA Logo Box at the bottom */
        .logo-box {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: #e8e8e8;
            border: 1px solid #ccc;
            border-bottom: none;
            width: 110px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px 4px 0 0;
        }

        /* Creating the PSA Logo Look */
        .psa-logo-text {
            font-style: italic;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -2px;
        }

        .p-blue { color: #004a99; }
        .s-red { color: #e31e24; margin: 0 -2px; }
        .a-blue { color: #004a99; }

        /* Specific sizing for the Serial Number row */
        .serial-row {
            font-size: 28px;
        }
    </style>
</head>
<body>

    <div class="psa-card">
        <div class="psa-label">
            
            <div class="line">
                <input type="text" class="left-col" value="1999 POKEMON GAME">
                <input type="text" class="right-col" value="#4">
            </div>

            <div class="line">
                <input type="text" class="left-col" value="CHARIZARD">
                <input type="text" class="right-col" value="MINT 9">
            </div>

            <div class="line">
                <input type="text" class="left-col" value="HOLOFOIL">
                <input type="text" class="right-col" value="AUTO 10">
            </div>

            <div class="line serial-row">
                <input type="text" class="left-col" style="font-size: 28px;" value="PSA/DNA CERT">
                <input type="text" class="right-col" style="font-size: 32px;" value="27581588">
            </div>

            <div class="logo-box">
                <div class="psa-logo-text">
                    <span class="p-blue">P</span><span class="s-red">S</span><span class="a-blue">A</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
