<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentic PSA Label Creator</title>
    <style>
        /* Using a font that matches the vintage printer style better */
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap');

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Roboto Condensed', sans-serif;
        }

        /* The Red Frame */
        .psa-container {
            width: 700px;
            height: 200px;
            background-color: #e21833;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* The Label Body */
        .label-body {
            width: 100%;
            height: 100%;
            background-color: #fff;
            /* Blue faint lines */
            background-image: linear-gradient(#e8f4f8 1px, transparent 1px);
            background-size: 100% 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px 18px;
            box-sizing: border-box;
        }

        /* Input Rows */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
        }

        input {
            border: none;
            background: transparent;
            font-family: 'Roboto Condensed', sans-serif;
            text-transform: uppercase;
            color: #222;
            padding: 0;
            outline: none;
            font-size: 32px;
            font-weight: 400;
        }

        .left-input { width: 75%; text-align: left; }
        .right-input { width: 25%; text-align: right; }

        /* The Logo Block */
        .psa-logo-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: #eef0f2;
            border: 1px solid #d1d3d4;
            border-bottom: none;
            width: 90px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Custom CSS PSA Logo to match the slant/overlap */
        .logo-text {
            font-size: 34px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -3px;
            display: flex;
        }

        .logo-p { color: #004b8d; transform: skewX(-2deg); }
        .logo-s { color: #e21833; position: relative; z-index: 2; margin-left: -1px; }
        .logo-a { color: #004b8d; margin-left: -2px; }
        .logo-reg { font-size: 8px; align-self: flex-start; margin-top: 10px; font-style: normal; color: #004b8d; }

        .serial-font { font-size: 30px; }
    </style>
</head>
<body>

    <div class="psa-container">
        <div class="label-body">
            
            <div class="row">
                <input type="text" class="left-input" value="1952 TOPPS">
                <input type="text" class="right-input" value="#311">
            </div>

            <div class="row">
                <input type="text" class="left-input" value="MICKEY MANTLE">
                <input type="text" class="right-input" value="MINT 9">
            </div>

            <div class="row">
                <input type="text" class="left-input" value="">
                <input type="text" class="right-input" value="AUTO 9">
            </div>

            <div class="row">
                <input type="text" class="left-input serial-font" value="PSA/DNA CERT">
                <input type="text" class="right-input serial-font" value="27581588">
            </div>

            <div class="psa-logo-base">
                <div class="logo-text">
                    <span class="logo-p">P</span>
                    <span class="logo-s">S</span>
                    <span class="logo-a">A</span>
                    <span class="logo-reg">®</span>
                </div>
            </div>

        </div>
    </div>

    <p style="color: white; margin-top: 20px; font-family: sans-serif;">Click any text on the label to change it!</p>

</body>
</html>
